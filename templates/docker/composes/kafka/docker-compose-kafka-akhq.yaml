# ==============================================================================
#  an-tool-ny - EXTENSION: AKHQ UI (Auto-includes core Kafka)
# ==============================================================================

version: '3.8'

include:
  - docker-compose-kafka.yaml

services:

  akhq:
    image: tchiotludo/akhq:0.25.0
    container_name: myapp_akhq
    ports:
      - "8080:8080"
    environment:
      AKHQ_CONFIGURATION: |
        akhq:
          connections:
            local-kafka-cluster:
              properties:
                bootstrap.servers: "myapp_kafka:9094"
              schema-registry:
                url: "http://myapp_schema_registry:8085"
    depends_on:
      - kafka
      - schema-registry
    networks:
      - kafka_net