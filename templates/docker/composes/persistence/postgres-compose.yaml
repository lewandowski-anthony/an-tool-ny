# ==============================================================================
#  an-tool-ny - LOCAL ENVIRONMENT TEMPLATE: DATABASE ONLY
#  Stack: PostgreSQL 15
# ==============================================================================

version: '3.8'

services:

  # --- DATABASE: PostgreSQL ---
  postgres:
    container_name: myapp_postgres
    image: postgres:15.8
    environment:
      TZ: UTC
      PGTZ: UTC
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: ${POSTGRES_DB:-myapp_db}
      PGDATA: /data/postgres
    volumes:
      - postgres_data:/data/postgres
    ports:
      - "15435:5432"
    networks:
      - database_net
    restart: unless-stopped

networks:
  database_net:
    driver: bridge

volumes:
  postgres_data: