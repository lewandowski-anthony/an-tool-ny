version: '3.8'

# https://github.com/dockur/windows-arm

services:
  windows:
    container_name: windows
    image: dockurr/windows-arm
    environment:
      - KVM=N
    cap_add:
      - NET_ADMIN
    ports:
      - "8006:8006"
      - "3389:3389/tcp"
      - "3389:3389/udp"
    volumes:
      - win_data:/storage
    stop_grace_period: 2m
    restart: on-failure

volumes:
  win_data: