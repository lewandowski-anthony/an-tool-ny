version: '3.8'

services:
  windows:
    container_name: windows_headless
    image: dockurr/windows-arm
    environment:
      - KVM=N
      - VIEW=no
    cap_add:
      - NET_ADMIN
    ports:
      - "3389:3389/tcp"
      - "3389:3389/udp"
    volumes:
      - win_headless_data:/storage
    stop_grace_period: 2m
    restart: on-failure

volumes:
  win_headless_data: