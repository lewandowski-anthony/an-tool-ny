services:
  kong-database:
    image: postgres:15
    container_name: kong-database
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=kong
      - POSTGRES_DB=kong
      - POSTGRES_PASSWORD=kong
    volumes:
      - "db-data-kong-postgres:/var/lib/postgresql/data"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "kong"]
      interval: 5s
      timeout: 5s
      retries: 5

  kong-migrations:
    image: kong:latest
    environment:
      - KONG_DATABASE=postgres
      - KONG_PG_HOST=kong-database
      - KONG_PG_USER=kong
      - KONG_PG_PASSWORD=kong
    command: kong migrations bootstrap
    depends_on:
      kong-database:
        condition: service_healthy

  kong:
    image: kong:latest
    container_name: kong
    environment:
      - KONG_DATABASE=postgres
      - KONG_PG_HOST=kong-database
      - KONG_PG_USER=kong
      - KONG_PG_PASSWORD=kong
      - KONG_PROXY_ACCESS_LOG=/dev/stdout
      - KONG_ADMIN_ACCESS_LOG=/dev/stdout
      - KONG_PROXY_ERROR_LOG=/dev/stderr
      - KONG_ADMIN_ERROR_LOG=/dev/stderr
      - KONG_ADMIN_LISTEN=0.0.0.0:8001, 0.0.0.0:8444 ssl
    restart: unless-stopped
    ports:
      - "8000:8000"
      - "8443:8443"
      - "8001:8001"
      - "8444:8444"
    depends_on:
      kong-migrations:
        condition: service_completed_successfully

  konga:
    image: pantsel/konga:latest
    container_name: konga
    ports:
      - "1337:1337"
    # Force Konga à préparer la base de données PostgreSQL avant de lancer l'application
    command: /bin/sh -c "node ./bin/konga.js prepare --adapter postgres --uri postgresql://kong:kong@kong-database:5432/kong && node ./app.js"
    environment:
      - DB_ADAPTER=postgres
      - DB_URI=postgresql://kong:kong@kong-database:5432/kong
      - NODE_ENV=production
    depends_on:
      kong-database:
        condition: service_healthy
      kong:
        condition: service_started
    restart: unless-stopped

volumes:
  db-data-kong-postgres: