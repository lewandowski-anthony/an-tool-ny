services:
  rabbitmq:
    container_name: myapp_rabbitmq
    image: rabbitmq:3.13-management
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    volumes:
      - ./definitions.json:/etc/rabbitmq/definitions.json:ro
    networks:
      - app_net
    restart: unless-stopped

networks:
  app_net:
    driver: bridge