version: '3.8'

services:

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: myapp_zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: '2181'
      ZOOKEEPER_ADMIN_ENABLE_SERVER: 'false'
    networks:
      - kafka_net

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: myapp_kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: '0'
      KAFKA_ZOOKEEPER_CONNECT: 'zookeeper:2181'
      KAFKA_NUM_PARTITIONS: '3'
      KAFKA_COMPRESSION_TYPE: 'gzip'
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: '1'
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: '1'
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: '1'
      KAFKA_LISTENERS: INTERNAL://0.0.0.0:9094,OUTSIDE://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://myapp_kafka:9094,OUTSIDE://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,OUTSIDE:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_CONFLUENT_SUPPORT_METRICS_ENABLE: 'false'
      KAFKA_JMX_PORT: '9091'
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'true'
      KAFKA_AUTHORIZER_CLASS_NAME: 'kafka.security.authorizer.AclAuthorizer'
      KAFKA_ALLOW_EVERYONE_IF_NO_ACL_FOUND: 'true'
    networks:
      - kafka_net

  init-kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: myapp_kafka_init
    depends_on:
      - kafka
    networks:
      - kafka_net
    entrypoint: [ '/bin/sh', '-c' ]
    command: |
      "
      echo 'Waiting for Kafka to be ready...'
      kafka-topics --bootstrap-server myapp_kafka:9094 --list

      echo 'Creating Kafka topics...'
      kafka-topics --bootstrap-server myapp_kafka:9094 --create --if-not-exists --topic myapp.events --replication-factor 1 --partitions 3
      kafka-topics --bootstrap-server myapp_kafka:9094 --create --if-not-exists --topic myapp.events.RETRY --replication-factor 1 --partitions 3
      kafka-topics --bootstrap-server myapp_kafka:9094 --create --if-not-exists --topic myapp.events.DLT --replication-factor 1 --partitions 1

      echo 'Successfully created the following topics:'
      kafka-topics --bootstrap-server myapp_kafka:9094 --list
      "

  schema-registry:
    image: confluentinc/cp-schema-registry:7.5.0
    container_name: myapp_schema_registry
    ports:
      - "8085:8085"
    depends_on:
      - kafka
    environment:
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: 'PLAINTEXT://myapp_kafka:9094'
      SCHEMA_REGISTRY_HOST_NAME: 'schema-registry'
      SCHEMA_REGISTRY_LISTENERS: 'http://0.0.0.0:8085'
      SCHEMA_REGISTRY_LOG4J_ROOT_LOGLEVEL: 'INFO'
    networks:
      - kafka_net

networks:
  kafka_net:
    driver: bridge