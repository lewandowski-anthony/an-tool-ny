apiVersion: image.toolkit.fluxcd.io/v1
kind: ImagePolicy
metadata:
  name: my-app-policy
  namespace: flux-system
spec:
  imageRepositoryRef:
    name: my-app-image
  policy:
    semver:
      range: '^1.x'

---

apiVersion: image.toolkit.fluxcd.io/v1
kind: ImagePolicy
metadata:
  name: mon-app-policy-prod
  namespace: flux-system
spec:
  imageRepositoryRef:
    name: mon-app-image
  policy:
    semver:
      # Allows all patch versions within the 1.2.x range (e.g., 1.2.1, 1.2.5)
      # Strictly blocks upgrading to 1.3.0 or higher
      range: '>=1.2.0 <1.3.0'

---

apiVersion: image.toolkit.fluxcd.io/v1
kind: ImagePolicy
metadata:
  name: mon-app-policy-staging
  namespace: flux-system
spec:
  imageRepositoryRef:
    name: mon-app-image
  policy:
    semver:
      # The '-0' suffix is the trick that tells Flux to include pre-releases.
      # It will automatically deploy tags like 1.5.0-rc.1, 1.5.0-beta.2, etc.
      range: '^1.5.x-0'

---

apiVersion: image.toolkit.fluxcd.io/v1
kind: ImagePolicy
metadata:
  name: mon-app-policy-branches
  namespace: flux-system
spec:
  imageRepositoryRef:
    name: mon-app-image
  policy:
    alphabetical:
      # 'desc' (descending) sorts from Z to A and 9 to 0.
      # Flux will pick the most recent tag in the dictionary (e.g., 'main-20260704' instead of 'main-20260601')
      order: desc

---

apiVersion: image.toolkit.fluxcd.io/v1
kind: ImagePolicy
metadata:
  name: mon-app-policy-ci
  namespace: flux-system
spec:
  imageRepositoryRef:
    name: mon-app-image
  policy:
    numerical:
      # Selects the highest number.
      # Unlike alphabetical mode, Flux correctly understands here that tag '100' is greater than tag '99'
      order: desc

